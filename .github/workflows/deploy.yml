name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Inject Firebase config
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          python3 -c "
          import os
          with open('index.html', 'r') as f:
              content = f.read()
          content = content.replace('__FIREBASE_API_KEY__', os.environ['FIREBASE_API_KEY'])
          content = content.replace('__FIREBASE_AUTH_DOMAIN__', os.environ['FIREBASE_AUTH_DOMAIN'])
          content = content.replace('__FIREBASE_PROJECT_ID__', os.environ['FIREBASE_PROJECT_ID'])
          content = content.replace('__FIREBASE_STORAGE_BUCKET__', os.environ['FIREBASE_STORAGE_BUCKET'])
          content = content.replace('__FIREBASE_MESSAGING_SENDER_ID__', os.environ['FIREBASE_MESSAGING_SENDER_ID'])
          content = content.replace('__FIREBASE_APP_ID__', os.environ['FIREBASE_APP_ID'])
          with open('index.html', 'w') as f:
              f.write(content)
          "

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: '.github'
