<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>돌림판</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #1a1a2e;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        /* 인증 화면 */
        #auth-screen {
            background: #16213e;
            padding: 40px;
            border-radius: 16px;
            width: 340px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        #auth-screen h2 {
            text-align: center;
            margin-bottom: 28px;
            font-size: 1.6rem;
        }
        .tab-buttons {
            display: flex;
            margin-bottom: 24px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #ffffff22;
        }
        .tab-buttons button {
            flex: 1;
            padding: 10px;
            background: transparent;
            color: #aaa;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        .tab-buttons button.active {
            background: #ff4757;
            color: white;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            color: #aaa;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            background: #0f3460;
            border: 1px solid #ffffff22;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        .form-group input:focus {
            border-color: #ff4757;
        }
        .auth-btn {
            width: 100%;
            padding: 13px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s;
        }
        .auth-btn:hover { opacity: 0.85; }
        .google-btn {
            width: 100%;
            padding: 13px;
            background: white;
            color: #333;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: opacity 0.2s;
        }
        .google-btn:hover { opacity: 0.9; }
        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 16px 0 6px;
            color: #555;
            font-size: 0.85rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #ffffff22;
        }
        #auth-error {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 12px;
            text-align: center;
            min-height: 1.2rem;
        }

        /* 돌림판 화면 */
        #wheel-screen { display: none; align-items: center; flex-direction: column; }
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 420px;
            margin-bottom: 20px;
        }
        .top-bar span { font-size: 0.9rem; color: #aaa; }
        .logout-btn {
            padding: 6px 16px;
            background: transparent;
            color: #ff4757;
            border: 1px solid #ff4757;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .logout-btn:hover { background: #ff4757; color: white; }
        h1 { margin-bottom: 24px; font-size: 2rem; letter-spacing: 2px; }
        .wheel-container {
            position: relative;
            width: 400px;
            height: 400px;
        }
        canvas { border-radius: 50%; }
        .pointer {
            position: absolute;
            top: 50%;
            right: -20px;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: 20px solid transparent;
            border-bottom: 20px solid transparent;
            border-right: 40px solid #ff4757;
            filter: drop-shadow(0 0 6px #ff4757);
        }
        #spinBtn {
            margin-top: 36px;
            padding: 14px 50px;
            font-size: 1.2rem;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 4px 20px rgba(255,71,87,0.5);
        }
        #spinBtn:hover { transform: scale(1.05); }
        #spinBtn:disabled { background: #555; box-shadow: none; cursor: not-allowed; }
        #result {
            margin-top: 24px;
            font-size: 1.6rem;
            font-weight: bold;
            min-height: 2rem;
            color: #ffd32a;
            text-shadow: 0 0 10px #ffd32a88;
        }
    </style>
</head>
<body>

    <!-- 로그인/회원가입 화면 -->
    <div id="auth-screen">
        <h2>🎡 돌림판</h2>
        <div class="tab-buttons">
            <button class="active" onclick="switchTab('login')">로그인</button>
            <button onclick="switchTab('signup')">회원가입</button>
        </div>
        <div class="form-group">
            <label>이메일</label>
            <input type="email" id="email" placeholder="example@email.com">
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" id="password" placeholder="6자 이상">
        </div>
        <button class="auth-btn" id="authBtn" onclick="handleAuth()">로그인</button>
        <div class="divider">또는</div>
        <button class="google-btn" onclick="loginWithGoogle()">
            <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Google로 로그인
        </button>
        <div id="auth-error"></div>
    </div>

    <!-- 돌림판 화면 -->
    <div id="wheel-screen">
        <div class="top-bar">
            <span id="user-email"></span>
            <button class="logout-btn" onclick="logout()">로그아웃</button>
        </div>
        <h1>🎡 돌림판</h1>
        <div class="wheel-container">
            <canvas id="wheel" width="400" height="400"></canvas>
            <div class="pointer"></div>
        </div>
        <button id="spinBtn" onclick="spin()">돌리기!</button>
        <div id="result"></div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
        import {
            getAuth,
            createUserWithEmailAndPassword,
            signInWithEmailAndPassword,
            signOut,
            onAuthStateChanged,
            GoogleAuthProvider,
            signInWithRedirect,
            getRedirectResult
        } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "__FIREBASE_API_KEY__",
            authDomain: "__FIREBASE_AUTH_DOMAIN__",
            projectId: "__FIREBASE_PROJECT_ID__",
            storageBucket: "__FIREBASE_STORAGE_BUCKET__",
            messagingSenderId: "__FIREBASE_MESSAGING_SENDER_ID__",
            appId: "__FIREBASE_APP_ID__"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // 로그인 상태 감지
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById("auth-screen").style.display = "none";
                document.getElementById("wheel-screen").style.display = "flex";
                document.getElementById("user-email").textContent = user.email;
                drawWheel(0);
            } else {
                document.getElementById("auth-screen").style.display = "block";
                document.getElementById("wheel-screen").style.display = "none";
            }
        });

        // 전역 함수 등록
        let isLogin = true;

        window.switchTab = (tab) => {
            isLogin = tab === "login";
            document.getElementById("authBtn").textContent = isLogin ? "로그인" : "회원가입";
            document.getElementById("auth-error").textContent = "";
            const btns = document.querySelectorAll(".tab-buttons button");
            btns[0].classList.toggle("active", isLogin);
            btns[1].classList.toggle("active", !isLogin);
        };

        window.handleAuth = async () => {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const errEl = document.getElementById("auth-error");
            errEl.textContent = "";
            try {
                if (isLogin) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    await createUserWithEmailAndPassword(auth, email, password);
                }
            } catch (e) {
                const msgs = {
                    "auth/invalid-email": "이메일 형식이 올바르지 않습니다.",
                    "auth/user-not-found": "등록되지 않은 이메일입니다.",
                    "auth/wrong-password": "비밀번호가 틀렸습니다.",
                    "auth/email-already-in-use": "이미 사용 중인 이메일입니다.",
                    "auth/weak-password": "비밀번호는 6자 이상이어야 합니다.",
                    "auth/invalid-credential": "이메일 또는 비밀번호가 틀렸습니다."
                };
                errEl.textContent = msgs[e.code] || "오류가 발생했습니다: " + e.code;
            }
        };

        window.logout = () => signOut(auth);

        // 페이지 로드 시 리다이렉트 결과 처리
        getRedirectResult(auth).catch(() => {});

        window.loginWithGoogle = async () => {
            const provider = new GoogleAuthProvider();
            await signInWithRedirect(auth, provider);
        };

        // 돌림판
        const items = ["1등", "2등", "3등", "꽝", "재도전", "꽝", "특별상", "꽝"];
        const colors = ["#ff6b6b","#feca57","#48dbfb","#ff9ff3","#54a0ff","#5f27cd","#00d2d3","#ff9f43"];
        let currentAngle = 0;
        let spinning = false;

        window.drawWheel = (angle) => {
            const canvas = document.getElementById("wheel");
            if (!canvas) return;
            const ctx = canvas.getContext("2d");
            const cx = canvas.width / 2, cy = canvas.height / 2;
            const radius = cx - 10;
            const arc = (2 * Math.PI) / items.length;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            items.forEach((item, i) => {
                const start = angle + i * arc;
                const end = start + arc;
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, radius, start, end);
                ctx.fillStyle = colors[i % colors.length];
                ctx.fill();
                ctx.strokeStyle = "#1a1a2e";
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(start + arc / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 18px Segoe UI";
                ctx.shadowColor = "rgba(0,0,0,0.4)";
                ctx.shadowBlur = 4;
                ctx.fillText(item, radius - 15, 6);
                ctx.restore();
            });
            ctx.beginPath();
            ctx.arc(cx, cy, 20, 0, 2 * Math.PI);
            ctx.fillStyle = "#1a1a2e";
            ctx.fill();
            ctx.strokeStyle = "white";
            ctx.lineWidth = 3;
            ctx.stroke();
        };

        window.spin = () => {
            if (spinning) return;
            spinning = true;
            document.getElementById("spinBtn").disabled = true;
            document.getElementById("result").textContent = "";
            const totalRotation = (Math.random() * 360 + 1440) * (Math.PI / 180);
            const duration = 4000;
            const start = performance.now();
            const startAngle = currentAngle;
            const arc = (2 * Math.PI) / items.length;

            function animate(now) {
                const elapsed = now - start;
                const progress = Math.min(elapsed / duration, 1);
                const ease = 1 - Math.pow(1 - progress, 4);
                currentAngle = startAngle + totalRotation * ease;
                window.drawWheel(currentAngle);
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    spinning = false;
                    document.getElementById("spinBtn").disabled = false;
                    const normalized = ((2 * Math.PI) - (currentAngle % (2 * Math.PI))) % (2 * Math.PI);
                    const index = Math.floor(normalized / arc) % items.length;
                    document.getElementById("result").textContent = "🎉 " + items[index] + "!";
                }
            }
            requestAnimationFrame(animate);
        };
    </script>
</body>
</html>
